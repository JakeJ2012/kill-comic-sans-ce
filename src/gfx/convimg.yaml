palettes:
  - name: global_palette
    images: automatic
    fixed-entries: 
    - color: {index: 0, r: 255, g: 0, b: 0}
    - color: {index: 1, r: 255, g: 255, b: 255}
    - color: {index: 2, r: 0, g: 0, b: 0}


converts:
  - name: images
    palette: global_palette
    transparent-color-index: 0
    images:
      - comic_sans.png
      - cross.png

outputs:
  - type: c
    include-file: gfx.h
    palettes:
      - global_palette
    converts:
      - images
